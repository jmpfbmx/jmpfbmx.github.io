baseurl = "https://jmpfbmx.github.io"
languageCode = "en-us"
theme = "terminal"
title = "jmpfbmx"
subtitle = ""
copyright = "©2021 - jmpfbmx"
keywords = ""
paginate = 5
disqusShortname = "jmpfbmx"
metaDataFormat = "toml"

[author]
  name = "Jose"

[params]
  # dir name of your blog content (default is `content/posts`)
  contentTypeName = "posts"
  # ["orange", "blue", "red", "green", "pink"]
  themeColor = "green"
  # if you set this to 0, only submenu trigger will be visible
  showMenuItems = 5
  # set theme to full screen width
  fullWidthTheme = false
  # center theme with default width
  centerTheme = true

[languages]
  [languages.en]
    menuMore = "Show more"
    readMore = "Read more"
    readOtherPosts = "Read other posts"

    [languages.en.params.logo]
      logoText = "jmpfbmx"
      logoHomeLink = "/"

    [languages.en.menu]
      
      [[languages.en.menu.main]]
        identifier = "about"
        name = "About"
        url = "/about"
      [[languages.en.menu.main]]
        identifier = "telegram"
        name = "Contact"
        url = "https://t.me/jmpfbmx"
      [[languages.en.menu.main]]
        identifier = "github"
        name = "GitHub"
        url = "https://github.com/jmpfbmx"
      [[languages.en.menu.main]]
        identifier = "posts"
        name = "Posts"
        url = "/posts"
      [[languages.en.menu.main]]
        identifier = "projects"
        name = "Projects"
        url = "/projects"
      [[languages.en.menu.main]]
        identifier = "rss"
        name = "RSS"
        url = "/index.xml"
